{# EPL league sidebar — page navigation links #}
{% with url_name=request.resolver_match.url_name %}
<nav class="sidebar-nav" aria-label="EPL navigation">
    <div class="sidebar-links">
        <a href="{% url 'epl_matches:dashboard' %}"
           class="sidebar-link {% if url_name == 'dashboard' %}sidebar-link--active{% endif %}">
            <i class="ph-duotone ph-house text-lg"></i>
            <span>Dashboard</span>
        </a>
        <a href="{% url 'epl_matches:leaderboard' %}"
           class="sidebar-link {% if url_name == 'leaderboard' %}sidebar-link--active{% endif %}">
            <i class="ph-duotone ph-ranking text-lg"></i>
            <span>Leaderboard</span>
        </a>
        <a href="{% url 'epl_matches:table' %}"
           class="sidebar-link {% if url_name == 'table' %}sidebar-link--active{% endif %}">
            <i class="ph-duotone ph-list-numbers text-lg"></i>
            <span>Standings</span>
        </a>
        <a href="{% url 'epl_betting:odds' %}"
           class="sidebar-link {% if url_name == 'odds' %}sidebar-link--active{% endif %}">
            <i class="ph-duotone ph-chart-line-up text-lg"></i>
            <span>Odds</span>
        </a>
        {% if user.is_authenticated %}
        <a href="{% url 'epl_challenges:challenges' %}"
           class="sidebar-link {% if url_name == 'challenges' %}sidebar-link--active{% endif %}">
            <i class="ph-duotone ph-trophy text-lg"></i>
            <span>Challenges</span>
        </a>
        {% endif %}
        {% if user.is_superuser %}
        <div class="sidebar-divider"></div>
        <a href="{% url 'epl_website:admin_dashboard' %}"
           class="sidebar-link {% if url_name == 'admin_dashboard' %}sidebar-link--active{% endif %}">
            <i class="ph-duotone ph-gauge text-lg"></i>
            <span>Admin</span>
        </a>
        {% endif %}
    </div>
</nav>
{% endwith %}
