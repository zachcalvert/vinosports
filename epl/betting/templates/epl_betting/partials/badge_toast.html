<div class="badge-toast badge-toast--{{ user_badge.badge.rarity }} badge-toast--{{ user_badge.badge.slug }} animate-slide-in" role="alert">
    <div class="badge-toast-shine" aria-hidden="true"></div>
    <div class="badge-toast-inner">
        <i class="ph-duotone ph-{{ user_badge.badge.icon }} badge-toast-icon" aria-hidden="true"></i>
        <div class="flex-1 min-w-0">
            <p class="badge-toast-eyebrow">Badge Unlocked!</p>
            <p class="badge-toast-title">{{ user_badge.badge.name }}</p>
            <p class="badge-toast-desc">{{ user_badge.badge.description }}</p>
            <span class="badge-rarity-pill badge-rarity-pill--{{ user_badge.badge.rarity }}">
                {{ user_badge.badge.get_rarity_display }}
            </span>
        </div>
        <button
            onclick="var t=this.closest('[role=alert]');t.classList.remove('animate-slide-in');t.classList.add('animate-slide-out');t.addEventListener('animationend',function(){t.remove()})"
            class="toast-dismiss flex-shrink-0"
            aria-label="Dismiss badge notification"
        >
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
</div>
