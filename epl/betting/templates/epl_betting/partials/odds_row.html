{% load match_tags %}
<tr class="border-b border-outline-variant/50 hover:bg-surface-container-low">
    <td class="px-3 py-2 text-sm text-muted whitespace-nowrap">{{ odds.bookmaker }}</td>
    <td class="px-3 py-2 text-sm text-center font-mono
        {% if odds.home_win == best_home %}text-primary font-bold{% else %}text-muted{% endif %}">
        {{ odds.home_win|format_odds }}
    </td>
    <td class="px-3 py-2 text-sm text-center font-mono
        {% if odds.draw == best_draw %}text-primary font-bold{% else %}text-muted{% endif %}">
        {{ odds.draw|format_odds }}
    </td>
    <td class="px-3 py-2 text-sm text-center font-mono
        {% if odds.away_win == best_away %}text-primary font-bold{% else %}text-muted{% endif %}">
        {{ odds.away_win|format_odds }}
    </td>
</tr>
