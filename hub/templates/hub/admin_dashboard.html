{% extends "hub/base.html" %}

{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="mb-6">
        <h1 class="font-headline italic font-black text-4xl sm:text-5xl uppercase tracking-tight leading-none">
            Admin Dashboard
        </h1>
        <div class="flex items-center gap-2 mt-3">
            <span class="w-1 h-5 rounded-full bg-primary"></span>
            <p class="text-muted text-sm uppercase tracking-wider font-medium">Cross-league activity overview</p>
        </div>
    </div>

    <div id="admin-stats">
        {% include "hub/partials/admin_stats.html" %}
    </div>

    <!-- Panels Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
        <!-- Bets & Parlays -->
        <div class="bg-surface-container-lowest rounded-xl border-b-4 border-outline-variant p-5">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 font-headline">
                <i class="ph-duotone ph-ticket text-primary"></i> Recent Bets &amp; Parlays
            </h2>
            <div id="admin-bets"
                 hx-get="{% url 'hub:admin_dashboard_bets' %}"
                 hx-trigger="load"
                 hx-swap="innerHTML">
                <div class="flex justify-center py-8">
                    <span class="spinner text-primary"></span>
                </div>
            </div>
        </div>

        <!-- Comments -->
        <div class="bg-surface-container-lowest rounded-xl border-b-4 border-outline-variant p-5">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 font-headline">
                <i class="ph-duotone ph-chat-circle-text text-primary"></i> Recent Comments
            </h2>
            <div id="admin-comments"
                 hx-get="{% url 'hub:admin_dashboard_comments' %}"
                 hx-trigger="load"
                 hx-swap="innerHTML">
                <div class="flex justify-center py-8">
                    <span class="spinner text-primary"></span>
                </div>
            </div>
        </div>

        <!-- Recent Signups -->
        <div class="bg-surface-container-lowest rounded-xl border-b-4 border-outline-variant p-5 lg:col-span-2">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 font-headline">
                <i class="ph-duotone ph-users text-primary"></i> Recent Signups
            </h2>
            <div id="admin-users"
                 hx-get="{% url 'hub:admin_dashboard_users' %}"
                 hx-trigger="load"
                 hx-swap="innerHTML">
                <div class="flex justify-center py-8">
                    <span class="spinner text-primary"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
    let ws;
    let refreshTimers = {};

    function debouncedRefresh(panelId, delay) {
        if (refreshTimers[panelId]) clearTimeout(refreshTimers[panelId]);
        refreshTimers[panelId] = setTimeout(function() {
            const el = document.getElementById(panelId);
            if (el) htmx.ajax("GET", el.getAttribute("hx-get"), {target: "#" + panelId, swap: "innerHTML"});
        }, delay);
    }

    function refreshStats() {
        if (refreshTimers["admin-stats"]) clearTimeout(refreshTimers["admin-stats"]);
        refreshTimers["admin-stats"] = setTimeout(function() {
            htmx.ajax("GET", "{% url 'hub:admin_dashboard_stats' %}", {target: "#admin-stats", swap: "innerHTML"});
        }, 2000);
    }

    function connect() {
        ws = new WebSocket(protocol + "//" + window.location.host + "/ws/admin/");

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            switch (data.type) {
                case "new_bet":
                    debouncedRefresh("admin-bets", 2000);
                    refreshStats();
                    break;
                case "new_comment":
                    debouncedRefresh("admin-comments", 2000);
                    refreshStats();
                    break;
                case "new_user":
                    debouncedRefresh("admin-users", 2000);
                    refreshStats();
                    break;
            }
        };

        ws.onclose = function(e) {
            setTimeout(connect, 5000);
        };
    }

    connect();
})();
</script>
{% endblock %}
