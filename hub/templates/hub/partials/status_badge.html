{% if status == "PENDING" %}
    <span class="inline-block px-2 py-0.5 rounded text-xs font-medium bg-warning/10 text-warning">Pending</span>
{% elif status == "WON" %}
    <span class="inline-block px-2 py-0.5 rounded text-xs font-medium bg-primary/10 text-primary">Won</span>
{% elif status == "LOST" %}
    <span class="inline-block px-2 py-0.5 rounded text-xs font-medium bg-danger/10 text-danger">Lost</span>
{% elif status == "VOID" %}
    <span class="inline-block px-2 py-0.5 rounded text-xs font-medium bg-gray-500/10 text-muted">Void</span>
{% endif %}
