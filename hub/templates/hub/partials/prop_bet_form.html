{% load i18n %}
<form hx-post="{% url 'hub:prop_bet_create_partial' %}" hx-target="#prop-bets-list" hx-swap="outerHTML"
      class="bg-surface-container rounded-xl border border-outline-variant/50 p-5 space-y-4">
    {% csrf_token %}
    {% if error %}<div class="text-danger text-sm font-medium">{{ error }}</div>{% endif %}
    <div>
        <label class="block text-xs font-bold text-secondary uppercase tracking-wider mb-1">Title</label>
        <input name="title" required class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-sm focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="Will the next game go to overtime?">
    </div>
    <div>
        <label class="block text-xs font-bold text-secondary uppercase tracking-wider mb-1">Description <span class="text-muted font-normal">(optional)</span></label>
        <textarea name="description" rows="2" class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-sm focus:outline-none focus:ring-2 focus:ring-primary/50"></textarea>
    </div>
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-xs font-bold text-secondary uppercase tracking-wider mb-1">Yes Odds</label>
            <input name="yes_odds" value="2.00" type="number" step="0.01" min="1.01" class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-sm font-mono focus:outline-none focus:ring-2 focus:ring-primary/50">
        </div>
        <div>
            <label class="block text-xs font-bold text-secondary uppercase tracking-wider mb-1">No Odds</label>
            <input name="no_odds" value="2.00" type="number" step="0.01" min="1.01" class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-sm font-mono focus:outline-none focus:ring-2 focus:ring-primary/50">
        </div>
    </div>
    <div class="flex gap-3">
        <button type="submit" class="px-4 py-2 rounded-lg bg-primary text-white font-bold text-sm uppercase tracking-wider hover:bg-primary/90 transition-colors">
            Create Prop
        </button>
        <button type="button" class="px-4 py-2 rounded-lg bg-surface-container-high text-sm font-semibold hover:bg-surface-container transition-colors"
                onclick="this.closest('form').remove()">
            Cancel
        </button>
    </div>
</form>
