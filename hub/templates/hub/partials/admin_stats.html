{% load currency_tags %}

<!-- Stats Summary -->
<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-2 mb-6">
    <div class="bg-surface-container-lowest rounded-xl border-b-4 border-outline-variant p-4 text-center">
        <div class="text-2xl font-bold text-primary font-mono">{{ total_users }}</div>
        <div class="text-xs text-muted uppercase tracking-wider mt-1">Users</div>
    </div>
    <div class="bg-surface-container-lowest rounded-xl border-b-4 border-outline-variant p-4 text-center">
        <div class="text-2xl font-bold text-primary font-mono">{{ total_articles }}</div>
        <div class="text-xs text-muted uppercase tracking-wider mt-1">Articles</div>
    </div>
    <div class="bg-surface-container-lowest rounded-xl border-b-4 border-outline-variant p-4 text-center">
        <div class="text-2xl font-bold text-primary font-mono">{{ total_comments }}</div>
        <div class="text-xs text-muted uppercase tracking-wider mt-1">Comments</div>
    </div>
    <div class="bg-surface-container-lowest rounded-xl border-b-4 border-outline-variant p-4 text-center">
        <div class="text-2xl font-bold text-primary font-mono">{{ active_bets }}</div>
        <div class="text-xs text-muted uppercase tracking-wider mt-1">Active Bets</div>
    </div>
    <div class="bg-surface-container-lowest rounded-xl border-b-4 border-outline-variant p-4 text-center">
        <div class="text-2xl font-bold text-primary font-mono">{{ total_bets_all_time }}</div>
        <div class="text-xs text-muted uppercase tracking-wider mt-1">Total Bets</div>
    </div>
    <div class="bg-surface-container-lowest rounded-xl border-b-4 border-outline-variant p-4 text-center">
        <div class="text-xl mb-2 font-bold text-primary font-mono">{{ total_wagered|currency:request.user }}</div>
        <div class="text-xs text-muted uppercase tracking-wider mt-1">Total Wagered</div>
    </div>


</div>
