<div id="admin-users-items" class="divide-y divide-outline-variant/50">
    {% for item in items %}
    <div class="flex items-center gap-3 py-2.5 text-sm">
        <div class="min-w-0 flex-1">
            <span class="truncate">{{ item.display_name|default:item.email }}</span>
        </div>
        <div class="text-xs text-muted whitespace-nowrap">{{ item.date_joined|timesince }} ago</div>
    </div>
    {% empty %}
    <div class="text-center py-8">
        <p class="text-muted">No users yet.</p>
    </div>
    {% endfor %}
</div>

{% if has_more %}
<div id="load-more-users" class="text-center mt-3">
    <button hx-get="{% url 'hub:admin_dashboard_users' %}?offset={{ next_offset }}"
            hx-target="#admin-users-items"
            hx-swap="beforeend"
            hx-indicator="#users-loading"
            class="text-primary text-sm hover:underline">
        View all
    </button>
    <span id="users-loading" class="htmx-indicator">
        <span class="spinner spinner-sm text-primary"></span>
    </span>
</div>
{% endif %}
