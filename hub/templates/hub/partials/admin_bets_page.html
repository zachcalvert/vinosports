{% for item in items %}
<div class="border-t border-outline-variant/50">
    {% include "hub/partials/admin_bets_row.html" with item=item %}
</div>
{% endfor %}

{% if has_more %}
<div id="load-more-bets" hx-swap-oob="true" class="text-center mt-3">
    <button hx-get="{% url 'hub:admin_dashboard_bets' %}?offset={{ next_offset }}"
            hx-target="#admin-bets-items"
            hx-swap="beforeend"
            hx-indicator="#bets-loading"
            class="text-primary text-sm hover:underline">
        Load more
    </button>
    <span id="bets-loading" class="htmx-indicator">
        <span class="spinner spinner-sm text-primary"></span>
    </span>
</div>
{% else %}
<div id="load-more-bets" hx-swap-oob="true"></div>
{% endif %}
