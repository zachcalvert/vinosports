<div id="admin-comments-items" class="divide-y divide-outline-variant/50">
    {% for item in items %}
        {% include "hub/partials/admin_comments_row.html" with item=item %}
    {% empty %}
    <div class="text-center py-8">
        <p class="text-muted">No comments yet.</p>
    </div>
    {% endfor %}
</div>

{% if has_more %}
<div id="load-more-comments" class="text-center mt-3">
    <a href="{% url 'hub:admin_comments_full' %}"
       class="text-primary text-sm hover:underline">
        View all &rarr;
    </a>
</div>
{% endif %}
