[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vinosports-core"
version = "0.1.0"
description = "Shared Django apps for the Vinosports platform"
requires-python = ">=3.11"
dependencies = [
    "django>=5.1",
    "channels[daphne]>=4.0",
    "channels-redis>=4.2",
    "celery[redis]>=5.4",
    "redis>=5.0",
    "anthropic>=0.40",
    "httpx>=0.27",
    "django-htmx>=1.17",
    "Pillow>=10.0",
    "dj-database-url>=2.1",
    "sentry-sdk[django]>=2.0",
    "django-storages[s3]>=1.14",
    "praw>=7.7",
]

[tool.hatch.build.targets.wheel]
packages = ["src/vinosports"]

[tool.hatch.build.targets.wheel.force-include]
"src/vinosports/templates" = "vinosports/templates"
