{% load currency_tags %}
<div class="reward-toast animate-slide-in" role="alert">
    <div class="reward-toast-confetti" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="reward-toast-inner">
        <i class="ph-duotone ph-{{ user_challenge.challenge.template.icon }} text-2xl shrink-0 text-accent" aria-hidden="true"></i>
        <div class="flex-1 min-w-0">
            <p class="reward-toast-title">Challenge Complete!</p>
            <p class="text-sm font-semibold text-white">{{ user_challenge.challenge.template.title }}</p>
            <p class="reward-toast-amount">+{{ user_challenge.challenge.template.reward_amount|currency:user }}</p>
        </div>
        <button
            onclick="var t=this.closest('[role=alert]');t.classList.remove('animate-slide-in');t.classList.add('animate-slide-out');t.addEventListener('animationend',function(){t.remove()})"
            class="toast-dismiss flex-shrink-0"
            aria-label="Dismiss challenge notification"
        >
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
</div>
