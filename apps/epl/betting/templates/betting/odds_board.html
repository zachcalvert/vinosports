{% extends "website/base.html" %}
{% load match_tags %}
{% block title %}Latest Match Odds{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-3xl font-bold mb-1">Latest Match Odds</h1>
    <p class="text-muted text-sm">Best available odds for upcoming matches</p>
</div>

<div id="odds-board"
     hx-get="{% url 'betting:odds_partial' %}"
     hx-trigger="every 30s"
     hx-swap="innerHTML"
     hx-indicator="#odds-loading">
    {% include "betting/partials/odds_board_body.html" %}
</div>
<div id="odds-loading" class="htmx-indicator text-center py-2">
    <span class="spinner spinner-sm text-accent"></span>
    <span class="text-xs text-muted ml-2">Refreshing odds&hellip;</span>
</div>
{% endblock %}
