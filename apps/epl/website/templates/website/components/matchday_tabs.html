<div id="matchday-tabs" {% if oob %}hx-swap-oob="outerHTML"{% endif %} class="matchday-tabs-wrapper">
    <button type="button" class="matchday-tabs-arrow matchday-tabs-arrow--left" id="md-arrow-left" aria-label="Scroll left" style="opacity:0;pointer-events:none;">
        <i class="ph-duotone ph-caret-left text-sm"></i>
    </button>
    <div class="matchday-tabs-fade matchday-tabs-fade--left" id="md-fade-left" style="opacity:0;"></div>

    <div id="md-scroll" class="matchday-tabs-scroll flex gap-1 overflow-x-auto px-8 py-1">
        {% for md in matchdays %}
            <button
                hx-get="{% url 'matches:dashboard' %}?matchday={{ md }}"
                hx-target="#fixture-list"
                hx-swap="innerHTML"
                hx-push-url="true"
                hx-indicator="#fixture-loading"
                {% if md == current_matchday %}id="active-matchday"{% endif %}
                class="flex-shrink-0 px-3 py-1.5 rounded text-sm font-medium transition-colors
                    {% if md == current_matchday %}bg-accent text-surface font-semibold{% else %}bg-surface text-muted hover:text-accent hover:bg-accent-light{% endif %}">
                {{ md }}
            </button>
        {% endfor %}
    </div>

    <div class="matchday-tabs-fade matchday-tabs-fade--right" id="md-fade-right" style="opacity:0;"></div>
    <button type="button" class="matchday-tabs-arrow matchday-tabs-arrow--right" id="md-arrow-right" aria-label="Scroll right" style="opacity:0;pointer-events:none;">
        <i class="ph-duotone ph-caret-right text-sm"></i>
    </button>
</div>
<script>
(function () {
    var scroll = document.getElementById('md-scroll');
    var arrowL = document.getElementById('md-arrow-left');
    var arrowR = document.getElementById('md-arrow-right');
    var fadeL = document.getElementById('md-fade-left');
    var fadeR = document.getElementById('md-fade-right');

    function updateArrows() {
        if (!scroll) return;
        var atStart = scroll.scrollLeft <= 4;
        var atEnd = scroll.scrollLeft + scroll.clientWidth >= scroll.scrollWidth - 4;

        arrowL.style.opacity = atStart ? '0' : '1';
        arrowL.style.pointerEvents = atStart ? 'none' : 'auto';
        fadeL.style.opacity = atStart ? '0' : '1';

        arrowR.style.opacity = atEnd ? '0' : '1';
        arrowR.style.pointerEvents = atEnd ? 'none' : 'auto';
        fadeR.style.opacity = atEnd ? '0' : '1';
    }

    function scrollToActiveMatchday() {
        var el = document.getElementById('active-matchday');
        if (el) {
            el.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'instant' });
        }
        setTimeout(updateArrows, 50);
    }

    if (scroll) {
        scroll.addEventListener('scroll', updateArrows, { passive: true });
        arrowL.addEventListener('click', function () {
            scroll.scrollBy({ left: -200, behavior: 'smooth' });
        });
        arrowR.addEventListener('click', function () {
            scroll.scrollBy({ left: 200, behavior: 'smooth' });
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', scrollToActiveMatchday);
    } else {
        scrollToActiveMatchday();
    }
    if (!window._matchdayScrollListenerAttached) {
        document.addEventListener('htmx:historyRestore', scrollToActiveMatchday);
        window._matchdayScrollListenerAttached = true;
    }
})();
</script>
