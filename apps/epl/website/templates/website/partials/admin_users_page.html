{% for item in items %}
<div class="flex items-center gap-3 py-2.5 text-sm border-t border-gray-700/50">
    {% include "website/components/avatar.html" with avatar_user=item avatar_size="xs" %}
    <div class="min-w-0 flex-1">
        <span class="truncate">{{ item.display_name|default:item.email }}</span>
    </div>
    <div class="text-xs text-muted whitespace-nowrap">{{ item.date_joined|timesince }} ago</div>
</div>
{% endfor %}

{% if has_more %}
<div id="load-more-users" hx-swap-oob="true" class="text-center mt-3">
    <button hx-get="{% url 'website:admin_dashboard_users' %}?offset={{ next_offset }}"
            hx-target="#admin-users-items"
            hx-swap="beforeend"
            hx-indicator="#users-loading"
            class="text-accent text-sm hover:underline">
        View all
    </button>
    <span id="users-loading" class="htmx-indicator">
        <span class="spinner spinner-sm text-accent"></span>
    </span>
</div>
{% else %}
<div id="load-more-users" hx-swap-oob="true"></div>
{% endif %}
