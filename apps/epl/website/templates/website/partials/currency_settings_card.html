{% load currency_tags %}
<section id="currency-settings-card" class="rounded-xl border-b-4 border-outline-variant bg-surface-container-lowest p-5">
    <p class="text-xs font-semibold uppercase tracking-wider text-primary mb-1">Preferences</p>
    <h2 class="text-xl font-bold">Currency</h2>
    <p class="mt-2 text-sm text-muted">Choose how balances and amounts are displayed across the site.</p>

    <form
        method="post"
        hx-post="{% url 'website:currency_update' %}"
        hx-target="#currency-settings-card"
        hx-swap="outerHTML"
        class="mt-4 space-y-3"
    >
        {% csrf_token %}
        <div>
            <label for="{{ currency_form.currency.id_for_label }}" class="block text-sm font-medium text-muted mb-1">Display currency</label>
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
                <div class="flex-1">
                    {{ currency_form.currency }}
                </div>
                <button
                    type="submit"
                    class="rounded-md bg-primary px-4 py-2 text-sm font-semibold text-dark transition-colors hover:bg-primary/90 whitespace-nowrap"
                >
                    Save currency
                </button>
            </div>
        </div>

        {% if currency_save_success %}
        <p class="text-primary text-sm">Currency updated.</p>
        {% endif %}

        <p class="text-xs text-muted">Currently displaying as: <span class="font-mono">{% currency_symbol user %}</span></p>
    </form>
</section>
