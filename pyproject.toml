[tool.ruff]
target-version = "py311"
extend-exclude = ["*/migrations/*.py"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["vinosports"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["tests.py", "test_*.py"]
testpaths = [".", "/packages/vinosports-core/src/tests"]
addopts = "-q"

[tool.coverage.run]
source = ["/packages/vinosports-core/src/vinosports", "hub", "nba", "epl"]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/test_*",
    "*/conftest.py",
    "*/admin.py",
    "*/apps.py",
    "*/management/commands/*",
    "*/consumers.py",
    "*/routing.py",
    "*/asgi.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ ==",
    "raise NotImplementedError",
]
