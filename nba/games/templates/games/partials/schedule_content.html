<p class="text-muted text-sm ml-5 mb-6">{{ target_date|date:"l, F j, Y" }}</p>

<!-- Date navigation + conference filter -->
<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
    <div class="flex items-center gap-2">
        <a href="?date={{ prev_date|date:'Y-m-d' }}{% if conference %}&conference={{ conference }}{% endif %}"
           class="inline-flex items-center justify-center w-9 h-9 rounded-lg border border-outline-variant bg-surface hover:bg-surface-container-low transition-colors"
           hx-get="{% url 'nba_games:schedule' %}?date={{ prev_date|date:'Y-m-d' }}{% if conference %}&conference={{ conference }}{% endif %}"
           hx-target="#schedule-content"
           hx-swap="innerHTML"
           hx-push-url="?date={{ prev_date|date:'Y-m-d' }}{% if conference %}&conference={{ conference }}{% endif %}"
           hx-indicator="#game-loading">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <span class="text-sm font-medium px-3 py-1.5 rounded-lg border border-outline-variant bg-surface min-w-[8rem] text-center">
            {{ target_date|date:"D, M j" }}
        </span>
        <a href="?date={{ next_date|date:'Y-m-d' }}{% if conference %}&conference={{ conference }}{% endif %}"
           class="inline-flex items-center justify-center w-9 h-9 rounded-lg border border-outline-variant bg-surface hover:bg-surface-container-low transition-colors"
           hx-get="{% url 'nba_games:schedule' %}?date={{ next_date|date:'Y-m-d' }}{% if conference %}&conference={{ conference }}{% endif %}"
           hx-target="#schedule-content"
           hx-swap="innerHTML"
           hx-push-url="?date={{ next_date|date:'Y-m-d' }}{% if conference %}&conference={{ conference }}{% endif %}"
           hx-indicator="#game-loading">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </a>
    </div>

    <div class="flex items-center gap-2 text-sm">
        <a href="?date={{ target_date|date:'Y-m-d' }}"
           class="px-3 py-1.5 rounded-lg border transition-colors
                  {% if not conference %}bg-primary text-dark font-bold border-primary{% else %}border-outline-variant bg-surface hover:bg-surface-container-low text-muted{% endif %}"
           hx-get="{% url 'nba_games:schedule' %}?date={{ target_date|date:'Y-m-d' }}"
           hx-target="#schedule-content"
           hx-swap="innerHTML"
           hx-push-url="?date={{ target_date|date:'Y-m-d' }}"
           hx-indicator="#game-loading">
            All
        </a>
        <a href="?date={{ target_date|date:'Y-m-d' }}&conference=EAST"
           class="px-3 py-1.5 rounded-lg border transition-colors
                  {% if conference == 'EAST' %}bg-primary text-dark font-bold border-primary{% else %}border-outline-variant bg-surface hover:bg-surface-container-low text-muted{% endif %}"
           hx-get="{% url 'nba_games:schedule' %}?date={{ target_date|date:'Y-m-d' }}&conference=EAST"
           hx-target="#schedule-content"
           hx-swap="innerHTML"
           hx-push-url="?date={{ target_date|date:'Y-m-d' }}&conference=EAST"
           hx-indicator="#game-loading">
            East
        </a>
        <a href="?date={{ target_date|date:'Y-m-d' }}&conference=WEST"
           class="px-3 py-1.5 rounded-lg border transition-colors
                  {% if conference == 'WEST' %}bg-primary text-dark font-bold border-primary{% else %}border-outline-variant bg-surface hover:bg-surface-container-low text-muted{% endif %}"
           hx-get="{% url 'nba_games:schedule' %}?date={{ target_date|date:'Y-m-d' }}&conference=WEST"
           hx-target="#schedule-content"
           hx-swap="innerHTML"
           hx-push-url="?date={{ target_date|date:'Y-m-d' }}&conference=WEST"
           hx-indicator="#game-loading">
            West
        </a>
    </div>
</div>

<!-- Game list -->
<div class="relative">
    <div id="game-loading" class="htmx-indicator pointer-events-none absolute inset-x-0 top-3 z-10 text-center">
        <span class="spinner text-primary"></span>
    </div>
    <div id="game-list">
        {% include "games/partials/game_list.html" %}
    </div>
</div>
