{% if games %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    {% for game in games %}
        {% include "games/partials/game_card.html" %}
    {% endfor %}
</div>
{% else %}
<div class="text-center py-12">
    <p class="text-muted text-sm">No games scheduled for this date.</p>
</div>
{% endif %}
