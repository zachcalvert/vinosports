{# NBA league sidebar — page navigation links #}
{% with url_name=request.resolver_match.url_name %}
<nav class="sidebar-nav" aria-label="NBA navigation">
    <div class="sidebar-links">
        <a href="{% url 'nba_dashboard' %}"
           class="sidebar-link {% if url_name == 'dashboard' %}sidebar-link--active{% endif %}">
            <i class="ph-duotone ph-house text-lg"></i>
            <span>Dashboard</span>
        </a>
        <a href="{% url 'nba_games:schedule' %}"
           class="sidebar-link {% if url_name == 'schedule' %}sidebar-link--active{% endif %}">
            <i class="ph-duotone ph-calendar text-lg"></i>
            <span>Schedule</span>
        </a>
        <a href="{% url 'nba_games:standings' %}"
           class="sidebar-link {% if url_name == 'standings' %}sidebar-link--active{% endif %}">
            <i class="ph-duotone ph-ranking text-lg"></i>
            <span>Standings</span>
        </a>
        {% if user.is_authenticated %}
        <a href="{% url 'nba_challenges:challenge_list' %}"
           class="sidebar-link {% if url_name == 'challenge_list' %}sidebar-link--active{% endif %}">
            <i class="ph-duotone ph-trophy text-lg"></i>
            <span>Challenges</span>
        </a>
        {% endif %}
        {% if user.is_superuser %}
        <div class="sidebar-divider"></div>
        <a href="{% url 'nba_website:admin_dashboard' %}"
           class="sidebar-link {% if url_name == 'admin_dashboard' %}sidebar-link--active{% endif %}">
            <i class="ph-duotone ph-gauge text-lg"></i>
            <span>Admin</span>
        </a>
        {% endif %}
    </div>
</nav>
{% endwith %}
