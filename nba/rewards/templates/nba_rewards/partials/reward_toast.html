{% load currency_tags %}
<div class="reward-toast animate-slide-in" role="alert" data-distribution-id="{{ distribution.pk }}">
    <div class="reward-toast-confetti" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="reward-toast-inner">
        <div class="reward-toast-icon">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>
        <div class="flex-1 min-w-0">
            <p class="reward-toast-title">{{ distribution.reward.name }}</p>
            <p class="reward-toast-amount">+{{ distribution.reward.amount|currency:user }}</p>
            {% if distribution.reward.description %}
            <p class="reward-toast-desc">{{ distribution.reward.description }}</p>
            {% endif %}
        </div>
        <button
            hx-post="{% url 'nba_rewards:dismiss' distribution.pk %}"
            hx-swap="outerHTML swap:300ms"
            hx-target="closest .reward-toast"
            class="toast-dismiss flex-shrink-0"
            aria-label="Dismiss reward notification"
        >
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
</div>
