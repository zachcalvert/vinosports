{% load currency_tags %}
<div class="futures-row--active px-4 sm:px-6 py-4 sm:py-5"
     id="futures-outcome-{{ outcome.id_hash }}">
    <!-- Row header: team + odds + dismiss -->
    <div class="grid grid-cols-12 items-center mb-4">
        <div class="col-span-6 flex items-center gap-3 sm:gap-4">
            {% if outcome.team.crest_url %}
            <img src="{{ outcome.team.crest_url }}" alt=""
                 class="w-8 h-8 sm:w-10 sm:h-10 object-contain flex-shrink-0">
            {% else %}
            <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg bg-surface-container flex items-center justify-center">
                <i class="ph-duotone ph-flag text-muted opacity-40"></i>
            </div>
            {% endif %}
            <span class="font-headline font-bold text-base sm:text-lg text-accent leading-none">{{ outcome.team.name }}</span>
        </div>
        <div class="col-span-3 text-center">
            <span class="font-headline font-bold text-lg sm:text-xl text-accent">{{ outcome.odds }}</span>
        </div>
        <div class="col-span-3 text-right">
            <button type="button"
                    hx-get="{% url 'worldcup_betting:futures_detail' outcome.market.id_hash %}"
                    hx-target="#futures-outcome-{{ outcome.id_hash }}"
                    hx-swap="outerHTML"
                    class="text-muted hover:text-primary text-lg px-2 transition-colors"
                    title="Cancel">&times;</button>
        </div>
    </div>

    {% if error %}
    <div class="bg-danger/10 text-danger text-xs font-medium px-3 py-2 rounded-lg mb-3">{{ error }}</div>
    {% endif %}

    <form hx-post="{% url 'worldcup_betting:place_futures_bet' outcome.id_hash %}"
          hx-target="#futures-outcome-{{ outcome.id_hash }}"
          hx-swap="outerHTML"
          hx-disabled-elt="find button[type='submit']"
          class="flex items-center gap-3 flex-wrap sm:flex-nowrap">
        {% csrf_token %}
        <div class="flex-1 min-w-[8rem]">{{ form.stake }}</div>
        <div class="text-sm text-muted font-mono font-bold whitespace-nowrap"
             id="futures-payout-{{ outcome.id_hash }}"></div>
        <button type="submit"
                class="bg-primary text-on-primary text-xs font-headline font-bold uppercase tracking-wider px-6 py-2.5 rounded-lg disabled:opacity-50">
            <span class="htmx-indicator"><span class="spinner spinner-sm mr-1"></span></span>
            Place Bet
        </button>
    </form>

    <script>
    (function() {
        var form = document.querySelector('#futures-outcome-{{ outcome.id_hash }} form');
        var input = form.querySelector('input[name="stake"]');
        var display = document.querySelector('#futures-payout-{{ outcome.id_hash }}');
        var odds = {{ outcome.odds }};
        var symbol = '{% currency_symbol user %}';
        input.addEventListener('input', function() {
            var stake = parseFloat(this.value) || 0;
            display.textContent = stake > 0 ? 'Payout: ' + symbol + (stake * odds).toFixed(2) : '';
        });
        input.focus();
    })();
    </script>
</div>
