app = "vinosports"
primary_region = "iad"

[build]

[deploy]
  release_command = "python manage.py migrate --noinput"

[env]
  DJANGO_SETTINGS_MODULE = "config.settings"
  DEBUG = "false"
  ALLOWED_HOSTS = "vinosports.com,www.vinosports.com,vinosports.fly.dev"
  CSRF_TRUSTED_ORIGINS = "https://vinosports.com,https://www.vinosports.com,https://vinosports.fly.dev"

[processes]
  web = "daphne -b 0.0.0.0 -p 8000 --application-close-timeout 10 -t 60 config.asgi:application"
  worker = "celery -A config worker -l info -Q epl,nba,nfl,default"
  beat = "celery -A config beat -l info"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  processes = ["web"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  processes = ["web"]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1

[[vm]]
  processes = ["worker"]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1

[[vm]]
  processes = ["beat"]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
