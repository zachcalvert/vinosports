x-common-env: &common-env
  DB_NAME: vinosports
  DB_USER: vinosports
  DB_PASSWORD: vinosports
  DB_HOST: db
  DB_PORT: "5432"
  REDIS_URL: redis://redis:6379/0
  SECRET_KEY: django-insecure-local-dev-only
  DEBUG: "true"
  ALLOWED_HOSTS: "*"
  DJANGO_SETTINGS_MODULE: config.settings

x-app-build: &app-build
  build:
    context: .
    dockerfile: Dockerfile
    args:
      INSTALL_TEST_DEPS: "true"
  env_file:
    - path: .env
      required: false
  environment:
    <<: *common-env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_started

services:
  # --- Infrastructure ---
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vinosports
      POSTGRES_USER: vinosports
      POSTGRES_PASSWORD: vinosports
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinosports"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # --- Web (single Django/Daphne instance) ---
  web:
    <<: *app-build
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "80:8000"
    volumes:
      - ./config:/app/config
      - ./epl:/app/epl
      - ./nba:/app/nba
      - ./nfl:/app/nfl
      - ./worldcup:/app/worldcup
      - ./ucl:/app/ucl
      - ./hub:/app/hub
      - ./news:/app/news
      - ./manage.py:/app/manage.py
      - ./pyproject.toml:/app/pyproject.toml
      - ./packages/vinosports-core/src:/packages/vinosports-core/src
      - media:/app/media

  # --- Tailwind CSS watcher (dev only) ---
  tailwind:
    <<: *app-build
    command: ["tailwindcss", "-i", "/packages/vinosports-core/src/vinosports/static/vinosports/css/tailwind.css", "-o", "/packages/vinosports-core/src/vinosports/static/vinosports/css/tailwind-out.css", "--watch", "--poll"]
    stdin_open: true
    volumes:
      - ./tailwind.config.js:/app/tailwind.config.js
      - ./packages/vinosports-core/src:/packages/vinosports-core/src
      - ./epl:/app/epl
      - ./nba:/app/nba
      - ./nfl:/app/nfl
      - ./worldcup:/app/worldcup
      - ./ucl:/app/ucl
      - ./hub:/app/hub
      - ./news:/app/news
    depends_on: []

  # --- JS bundle watcher (dev only) ---
  jsbuild:
    <<: *app-build
    command: ["npx", "esbuild", "frontend/main.js", "--bundle", "--sourcemap", "--outfile=/packages/vinosports-core/src/vinosports/static/vinosports/js/app.js", "--format=iife", "--target=es2020", "--watch"]
    stdin_open: true
    volumes:
      - ./frontend:/app/frontend
      - ./package.json:/app/package.json
      - ./node_modules:/app/node_modules
      - ./packages/vinosports-core/src:/packages/vinosports-core/src
    depends_on: []

  # --- Celery Worker (all queues) ---
  worker:
    <<: *app-build
    command: celery -A config worker -l info -Q epl,nba,nfl,news,worldcup,ucl
    volumes:
      - ./config:/app/config
      - ./epl:/app/epl
      - ./nba:/app/nba
      - ./nfl:/app/nfl
      - ./worldcup:/app/worldcup
      - ./ucl:/app/ucl
      - ./hub:/app/hub
      - ./news:/app/news
      - ./manage.py:/app/manage.py
      - ./packages/vinosports-core/src:/packages/vinosports-core/src
      - media:/app/media

  # --- Celery Beat ---
  beat:
    <<: *app-build
    command: celery -A config beat -l info
    volumes:
      - ./config:/app/config
      - ./epl:/app/epl
      - ./nba:/app/nba
      - ./nfl:/app/nfl
      - ./worldcup:/app/worldcup
      - ./ucl:/app/ucl
      - ./hub:/app/hub
      - ./news:/app/news
      - ./manage.py:/app/manage.py
      - ./packages/vinosports-core/src:/packages/vinosports-core/src

volumes:
  pgdata:
  media:
