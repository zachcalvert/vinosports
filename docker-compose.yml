x-common-env: &common-env
  DB_NAME: vinosports
  DB_USER: vinosports
  DB_PASSWORD: vinosports
  DB_HOST: db
  DB_PORT: "5432"
  REDIS_URL: redis://redis:6379/0
  SECRET_KEY: django-insecure-local-dev-only
  DEBUG: "true"
  ALLOWED_HOSTS: "*"
  DJANGO_SETTINGS_MODULE: config.settings

x-app-build: &app-build
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - path: .env
      required: false
  environment:
    <<: *common-env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_started

services:
  # --- Infrastructure ---
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vinosports
      POSTGRES_USER: vinosports
      POSTGRES_PASSWORD: vinosports
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinosports"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # --- Reverse Proxy ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

  # --- Web (single Django/Daphne instance) ---
  web:
    <<: *app-build
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./config:/app/config
      - ./epl:/app/epl
      - ./nba:/app/nba
      - ./hub:/app/hub
      - ./manage.py:/app/manage.py
      - ./packages/vinosports-core/src:/packages/vinosports-core/src

  # --- Celery Worker (all queues) ---
  worker:
    <<: *app-build
    command: celery -A config worker -l info -Q epl,nba
    volumes:
      - ./config:/app/config
      - ./epl:/app/epl
      - ./nba:/app/nba
      - ./hub:/app/hub
      - ./manage.py:/app/manage.py
      - ./packages/vinosports-core/src:/packages/vinosports-core/src

  # --- Celery Beat ---
  beat:
    <<: *app-build
    command: celery -A config beat -l info
    volumes:
      - ./config:/app/config
      - ./epl:/app/epl
      - ./nba:/app/nba
      - ./hub:/app/hub
      - ./manage.py:/app/manage.py
      - ./packages/vinosports-core/src:/packages/vinosports-core/src

volumes:
  pgdata:
