x-common-env: &common-env
  DATABASE_URL: postgres://vinosports:vinosports@db:5432/vinosports
  REDIS_URL: redis://redis:6379/0
  SECRET_KEY: django-insecure-local-dev-only
  DEBUG: "true"
  ALLOWED_HOSTS: "*"

x-epl-build: &epl-build
  build:
    context: .
    dockerfile: apps/epl/Dockerfile
  env_file:
    - path: .env
      required: false
  environment:
    <<: *common-env
    DJANGO_SETTINGS_MODULE: config.settings
    DB_NAME: vinosports
    DB_USER: vinosports
    DB_PASSWORD: vinosports
    DB_HOST: db
    DB_PORT: "5432"
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_started

x-hub-build: &hub-build
  build:
    context: .
    dockerfile: apps/hub/Dockerfile
  env_file:
    - path: .env
      required: false
  environment:
    <<: *common-env
    DJANGO_SETTINGS_MODULE: config.settings
    DB_NAME: vinosports
    DB_USER: vinosports
    DB_PASSWORD: vinosports
    DB_HOST: db
    DB_PORT: "5432"
    EPL_URL: http://localhost:8000
    NBA_URL: http://localhost:8001
  depends_on:
    db:
      condition: service_healthy

x-nba-build: &nba-build
  build:
    context: .
    dockerfile: apps/nba/Dockerfile
  env_file:
    - path: .env
      required: false
  environment:
    <<: *common-env
    DJANGO_SETTINGS_MODULE: config.settings
    DB_NAME: vinosports
    DB_USER: vinosports
    DB_PASSWORD: vinosports
    DB_HOST: db
    DB_PORT: "5432"
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_started

services:
  # --- Infrastructure ---
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vinosports
      POSTGRES_USER: vinosports
      POSTGRES_PASSWORD: vinosports
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinosports"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # --- Migrations (run once, shared DB) ---
  migrate:
    <<: *epl-build
    entrypoint: []
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        echo 'EPL migrations complete.' &&
        cd /nba &&
        python manage.py migrate --noinput &&
        echo 'NBA migrations complete.'
      "
    volumes:
      - ./apps/nba:/nba
    restart: "no"
    profiles:
      - migrate

  # --- EPL Services ---
  epl-web:
    <<: *epl-build
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./apps/epl:/app
      - ./packages/vinosports-core/src:/packages/vinosports-core/src

  epl-worker:
    <<: *epl-build
    entrypoint: []
    command: celery -A config worker -l info -Q default
    volumes:
      - ./apps/epl:/app
      - ./packages/vinosports-core/src:/packages/vinosports-core/src

  epl-beat:
    <<: *epl-build
    entrypoint: []
    command: celery -A config beat -l info
    volumes:
      - ./apps/epl:/app
      - ./packages/vinosports-core/src:/packages/vinosports-core/src

  # --- Hub (Homepage) ---
  hub-web:
    <<: *hub-build
    ports:
      - "7999:8000"
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./apps/hub:/app
      - ./packages/vinosports-core/src:/packages/vinosports-core/src

  # --- NBA Services ---
  nba-web:
    <<: *nba-build
    ports:
      - "8001:8000"
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./apps/nba:/app
      - ./packages/vinosports-core/src:/packages/vinosports-core/src

  nba-worker:
    <<: *nba-build
    entrypoint: []
    command: celery -A config worker -l info -Q default
    volumes:
      - ./apps/nba:/app
      - ./packages/vinosports-core/src:/packages/vinosports-core/src

  nba-beat:
    <<: *nba-build
    entrypoint: []
    command: celery -A config beat -l info
    volumes:
      - ./apps/nba:/app
      - ./packages/vinosports-core/src:/packages/vinosports-core/src

volumes:
  pgdata:
