name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.7"
          args: check
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.7"
          args: format --check

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vinosports
          POSTGRES_USER: vinosports
          POSTGRES_PASSWORD: vinosports
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vinosports"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DB_NAME: vinosports
      DB_USER: vinosports
      DB_PASSWORD: vinosports
      DB_HOST: localhost
      DB_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-key
      DEBUG: "true"
      ALLOWED_HOSTS: "*"
      DJANGO_SETTINGS_MODULE: config.settings
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv pip install --system -e packages/vinosports-core
          uv pip install --system psycopg2-binary whitenoise pytest pytest-django pytest-cov pytest-xdist factory-boy

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python -m pytest -n auto --dist worksteal --cov=vinosports --cov=hub --cov=nba --cov=epl --cov-report=term-missing:skip-covered --cov-config=pyproject.toml

  deploy:
    name: Deploy
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
